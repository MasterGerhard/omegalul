<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lucky 7s Slot Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255,50,50,0.04) 0%, transparent 40%),
      radial-gradient(ellipse at 60% 80%, rgba(100,50,255,0.04) 0%, transparent 40%);
  }

  .cabinet {
    position: relative;
    z-index: 1;
    width: min(460px, 96vw);
    background: linear-gradient(180deg, #1a1020 0%, #12091a 100%);
    border-radius: 24px;
    border: 2px solid #3a2050;
    box-shadow:
      0 0 60px rgba(180,0,255,0.15),
      0 0 120px rgba(180,0,255,0.08),
      inset 0 1px 0 rgba(255,255,255,0.05);
    padding: 16px 20px 20px;
  }

  .marquee {
    text-align: center;
    margin-bottom: 8px;
  }

  .marquee-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 10vw, 52px);
    letter-spacing: 6px;
    line-height: 1;
    background: linear-gradient(180deg, #fff700 0%, #ffaa00 50%, #ff6600 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,200,0,0.5));
  }

  .marquee-sub {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: #ff4488;
    margin-top: 1px;
    text-transform: uppercase;
  }

  .lights-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 7px 0;
  }

  .bulb {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ffcc00;
    box-shadow: 0 0 6px #ffcc00;
    animation: blink 1.2s infinite alternate;
  }
  .bulb:nth-child(even) { background: #ff4488; box-shadow: 0 0 6px #ff4488; animation-delay: 0.6s; }
  .bulb:nth-child(3n) { background: #44ffaa; box-shadow: 0 0 6px #44ffaa; animation-delay: 0.3s; }

  @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0.3; } }

  .screen-frame {
    background: #080810;
    border-radius: 14px;
    border: 3px solid #2a1540;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 20px rgba(120,0,200,0.2);
    padding: 14px;
    margin-bottom: 12px;
  }

  .reels-container {
    display: flex;
    gap: 8px;
    height: 150px;
    background: #04040c;
    border-radius: 10px;
    border: 2px solid #1a0a2a;
    overflow: hidden;
    position: relative;
  }

  .reel-wrapper {
    flex: 1;
    overflow: hidden;
    position: relative;
    border-right: 1px solid #1a0a2a;
  }
  .reel-wrapper:last-child { border-right: none; }

  .reel { display: flex; flex-direction: column; transition: none; }

  .reel.spinning { animation: spin-blur 0.1s steps(1) infinite; }

  @keyframes spin-blur {
    0%   { transform: translateY(0); }
    25%  { transform: translateY(-50px); }
    50%  { transform: translateY(-100px); }
    75%  { transform: translateY(-150px); }
    100% { transform: translateY(0); }
  }

  .symbol {
    width: 100%;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
    user-select: none;
  }

  .win-line {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 54px; transform: translateY(-50%);
    border-top: 2px solid rgba(255,200,0,0.3);
    border-bottom: 2px solid rgba(255,200,0,0.3);
    pointer-events: none; z-index: 5;
  }

  .reel-highlight {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 54px; transform: translateY(-50%);
    background: rgba(255,215,0,0.05);
    pointer-events: none; z-index: 4;
  }

  .paytable {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-top: 10px;
  }

  .pay-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.03);
    border-radius: 7px;
    padding: 5px 8px;
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 11px;
    color: #aaa;
  }

  .pay-symbols { font-size: 15px; letter-spacing: -2px; }
  .pay-mult { margin-left: auto; font-family: 'Orbitron', monospace; font-size: 10px; color: #ffcc00; font-weight: 700; }

  .info-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .info-card {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 7px 10px;
    text-align: center;
  }

  .info-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 2px;
    font-family: 'Orbitron', monospace;
  }

  .info-value {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  .info-value.balance { color: #44ffaa; }
  .info-value.win { color: #ffcc00; }

  .controls { display: flex; flex-direction: column; gap: 9px; }

  .bet-section { display: flex; align-items: center; gap: 8px; }

  .bet-label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: #666; font-family: 'Orbitron', monospace; white-space: nowrap;
  }

  .bet-buttons { display: flex; gap: 5px; flex: 1; }

  .bet-btn {
    flex: 1; padding: 7px 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px;
    color: #ccc;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .bet-btn:hover { background: rgba(255,200,0,0.1); border-color: rgba(255,200,0,0.3); color: #ffcc00; }
  .bet-btn.active { background: rgba(255,200,0,0.15); border-color: #ffcc00; color: #ffcc00; box-shadow: 0 0 10px rgba(255,200,0,0.2); }

  .spin-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(180deg, #ff6600 0%, #cc2200 100%);
    border: none; border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 4px; color: #fff;
    cursor: pointer; transition: all 0.15s;
    box-shadow: 0 4px 20px rgba(255,80,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    position: relative; overflow: hidden;
  }

  .spin-btn::after {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.4s;
  }
  .spin-btn:hover::after { left: 150%; }
  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,80,0,0.5); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled { background: linear-gradient(180deg, #444 0%, #222 100%); box-shadow: none; cursor: not-allowed; color: #888; }

  .message-area {
    text-align: center; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }

  .message {
    font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; color: #ffcc00;
    text-shadow: 0 0 20px rgba(255,200,0,0.5);
    opacity: 0; transition: opacity 0.3s;
  }
  .message.visible { opacity: 1; }

  .progress-bar {
    background: rgba(255,255,255,0.06); border-radius: 5px;
    height: 5px; margin-top: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #44ffaa, #ffcc00);
    border-radius: 5px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-labels {
    display: flex; justify-content: space-between;
    margin-top: 3px; font-size: 9px; color: #555;
    font-family: 'Orbitron', monospace;
  }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    z-index: 100; display: none; align-items: center;
    justify-content: center; flex-direction: column; gap: 16px;
  }
  .overlay.show { display: flex; }

  .overlay-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; letter-spacing: 6px; text-align: center; line-height: 1;
  }
  .overlay-title.win-title {
    background: linear-gradient(180deg, #fff700 0%, #ffaa00 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; filter: drop-shadow(0 0 40px rgba(255,200,0,0.6));
  }
  .overlay-title.lose-title { color: #ff2244; filter: drop-shadow(0 0 40px rgba(255,0,50,0.5)); }

  .overlay-sub { font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 2px; color: #aaa; text-align: center; }

  .restart-btn {
    padding: 14px 44px;
    background: linear-gradient(180deg, #ff6600 0%, #cc2200 100%);
    border: none; border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; color: #fff;
    cursor: pointer; box-shadow: 0 4px 24px rgba(255,80,0,0.4); transition: all 0.15s; margin-top: 6px;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,80,0,0.5); }

  .win-flash { animation: winPulse 0.5s ease-out 3; }

  @keyframes winPulse {
    0%   { box-shadow: 0 0 60px rgba(180,0,255,0.15), 0 0 120px rgba(180,0,255,0.08); }
    50%  { box-shadow: 0 0 80px rgba(255,215,0,0.4), 0 0 160px rgba(255,215,0,0.2); }
    100% { box-shadow: 0 0 60px rgba(180,0,255,0.15), 0 0 120px rgba(180,0,255,0.08); }
  }

  @keyframes symbolLand {
    0% { transform: scale(1.3); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }
  .symbol.landing { animation: symbolLand 0.2s ease-out; }
</style>
</head>
<body>

<div class="stars"></div>

<div class="cabinet" id="cabinet">
  <div class="marquee">
    <div class="marquee-title">Lucky 7s</div>
    <div class="marquee-sub">Classic Slots &bull; 98% RTP</div>
  </div>

  <div class="lights-row">
    <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
    <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
    <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
    <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
  </div>

  <div class="screen-frame">
    <div class="reels-container" id="reels-container">
      <div class="reel-wrapper">
        <div class="reel" id="reel0">
          <div class="symbol">🍒</div>
          <div class="symbol">🍒</div>
          <div class="symbol">🍒</div>
        </div>
        <div class="reel-highlight"></div>
      </div>
      <div class="reel-wrapper">
        <div class="reel" id="reel1">
          <div class="symbol">🍒</div>
          <div class="symbol">🍒</div>
          <div class="symbol">🍒</div>
        </div>
        <div class="reel-highlight"></div>
      </div>
      <div class="reel-wrapper">
        <div class="reel" id="reel2">
          <div class="symbol">🍒</div>
          <div class="symbol">🍒</div>
          <div class="symbol">🍒</div>
        </div>
        <div class="reel-highlight"></div>
      </div>
      <div class="win-line"></div>
    </div>

    <div class="paytable">
      <div class="pay-row"><span class="pay-symbols">7️⃣7️⃣7️⃣</span><span class="pay-mult">×100</span></div>
      <div class="pay-row"><span class="pay-symbols">⭐⭐⭐</span><span class="pay-mult">×20</span></div>
      <div class="pay-row"><span class="pay-symbols">🔔🔔🔔</span><span class="pay-mult">×10</span></div>
      <div class="pay-row"><span class="pay-symbols">🍇🍇🍇</span><span class="pay-mult">×5</span></div>
      <div class="pay-row"><span class="pay-symbols">🍋🍋🍋</span><span class="pay-mult">×4</span></div>
      <div class="pay-row"><span class="pay-symbols">🍒🍒🍒</span><span class="pay-mult">×3</span></div>
      <div class="pay-row"><span class="pay-symbols">🍒🍒</span><span class="pay-mult">×1.5</span></div>
      <div class="pay-row"><span class="pay-symbols">7️⃣</span><span class="pay-mult">×1.5×</span></div>
    </div>
  </div>

  <div class="info-bar">
    <div class="info-card">
      <div class="info-label">Balance</div>
      <div class="info-value balance" id="balance-display">$20.00</div>
    </div>
    <div class="info-card">
      <div class="info-label">Last Win</div>
      <div class="info-value win" id="win-display">—</div>
    </div>
    <div class="info-card">
      <div class="info-label">Bet</div>
      <div class="info-value" id="bet-display" style="color:#ff8844;">$0.20</div>
    </div>
  </div>

  <div class="controls">
    <div class="bet-section">
      <span class="bet-label">Bet</span>
      <div class="bet-buttons">
        <button class="bet-btn active" onclick="setBet(0)">$0.20</button>
        <button class="bet-btn" onclick="setBet(1)">$0.50</button>
        <button class="bet-btn" onclick="setBet(2)">$1.00</button>
        <button class="bet-btn" onclick="setBet(3)">$2.00</button>
        <button class="bet-btn" onclick="setBet(4)">$5.00</button>
      </div>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="spin()">SPIN</button>

    <div class="message-area">
      <div class="message" id="message"></div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
  </div>
  <div class="progress-labels">
    <span>$0</span>
    <span>Goal: $100</span>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-title" id="overlay-title"></div>
  <div class="overlay-sub" id="overlay-sub"></div>
  <button class="restart-btn" onclick="restart()">PLAY AGAIN</button>
</div>

<script>
const BETS = [0.20, 0.50, 1.00, 2.00, 5.00];
const START_BALANCE = 20;
const WIN_GOAL = 100;
const RTP = 0.98;
const SYMBOLS = ['7️⃣', '⭐', '🔔', '🍇', '🍋', '🍒'];
const WEIGHTS = [2, 4, 7, 12, 18, 30];
const TOTAL_WEIGHT = WEIGHTS.reduce((a, b) => a + b, 0);
const PAYOUTS = { '7️⃣7️⃣7️⃣': 100, '⭐⭐⭐': 20, '🔔🔔🔔': 10, '🍇🍇🍇': 5, '🍋🍋🍋': 4, '🍒🍒🍒': 3 };

let balance = START_BALANCE;
let currentBet = 0;
let spinning = false;
let msgTimer = null;

function weightedRandom() {
  let r = Math.random() * TOTAL_WEIGHT;
  for (let i = 0; i < WEIGHTS.length; i++) { r -= WEIGHTS[i]; if (r <= 0) return i; }
  return SYMBOLS.length - 1;
}

function calcMultiplier(s0, s1, s2) {
  const key = s0 + s1 + s2;
  if (PAYOUTS[key]) return PAYOUTS[key];
  const count7 = [s0, s1, s2].filter(s => s === '7️⃣').length;
  if (count7 >= 1 && (s0 === '7️⃣' || s1 === '7️⃣')) return 1.5;
  const cherries = [s0, s1, s2].filter(s => s === '🍒');
  if (cherries.length === 2) return 1.5;
  return 0;
}

function getExpectedRTP() {
  let totalEV = 0;
  const n = SYMBOLS.length;
  for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) for (let k = 0; k < n; k++) {
    const p = (WEIGHTS[i]/TOTAL_WEIGHT)*(WEIGHTS[j]/TOTAL_WEIGHT)*(WEIGHTS[k]/TOTAL_WEIGHT);
    totalEV += p * calcMultiplier(SYMBOLS[i], SYMBOLS[j], SYMBOLS[k]);
  }
  return totalEV;
}

const BASE_RTP = getExpectedRTP();

function spinSymbols() {
  const raw = [weightedRandom(), weightedRandom(), weightedRandom()];
  const naturalMult = calcMultiplier(SYMBOLS[raw[0]], SYMBOLS[raw[1]], SYMBOLS[raw[2]]);
  const naturalWin = naturalMult * BETS[currentBet];
  const naturalEV = naturalWin - BETS[currentBet];
  const targetEV = (RTP - 1) * BETS[currentBet];
  const evGap = targetEV - naturalEV;
  const blendFactor = Math.min(1, Math.abs(evGap) / (BETS[currentBet] * 0.5));
  const shouldNudge = Math.random() < blendFactor * 0.4;
  if (shouldNudge) {
    if (evGap > 0 && naturalMult === 0) { if (Math.random() < 0.3) { raw[0] = SYMBOLS.indexOf('🍒'); raw[1] = SYMBOLS.indexOf('🍒'); } }
    else if (evGap < 0 && naturalMult > 3) { raw[2] = Math.floor(Math.random() * 3) + 3; }
  }
  return raw.map(i => SYMBOLS[i]);
}

function setBet(idx) {
  if (spinning) return;
  currentBet = idx;
  document.querySelectorAll('.bet-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('bet-display').textContent = '$' + BETS[idx].toFixed(2);
}

function setReelSymbols(reelId, top, mid, bottom) {
  const reel = document.getElementById(reelId);
  const syms = reel.querySelectorAll('.symbol');
  syms[0].textContent = top; syms[1].textContent = mid; syms[2].textContent = bottom;
}

function showMessage(text, duration = 2000) {
  const el = document.getElementById('message');
  el.textContent = text; el.classList.add('visible');
  clearTimeout(msgTimer);
  if (duration > 0) msgTimer = setTimeout(() => el.classList.remove('visible'), duration);
}

function hideMessage() { document.getElementById('message').classList.remove('visible'); }

function updateUI() {
  document.getElementById('balance-display').textContent = '$' + balance.toFixed(2);
  const pct = Math.min(100, Math.max(0, (balance / WIN_GOAL) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
}

function spin() {
  if (spinning) return;
  if (balance < BETS[currentBet]) { showMessage('INSUFFICIENT FUNDS'); return; }
  spinning = true; hideMessage();
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('win-display').textContent = '—';
  balance -= BETS[currentBet];
  balance = Math.round(balance * 100) / 100;
  updateUI();
  const results = spinSymbols();
  for (let i = 0; i < 3; i++) document.getElementById('reel' + i).classList.add('spinning');
  [600, 900, 1200].forEach((delay, reelIdx) => {
    setTimeout(() => {
      const reel = document.getElementById('reel' + reelIdx);
      reel.classList.remove('spinning');
      const above = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
      const below = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
      setReelSymbols('reel' + reelIdx, above, results[reelIdx], below);
      const midSym = reel.querySelectorAll('.symbol')[1];
      midSym.classList.add('landing');
      setTimeout(() => midSym.classList.remove('landing'), 300);
      if (reelIdx === 2) setTimeout(() => resolveSpIn(results), 200);
    }, delay);
  });
}

function resolveSpIn(results) {
  const mult = calcMultiplier(results[0], results[1], results[2]);
  const winAmt = Math.round(mult * BETS[currentBet] * 100) / 100;
  if (winAmt > 0) {
    balance += winAmt;
    balance = Math.round(balance * 100) / 100;
    document.getElementById('win-display').textContent = '+$' + winAmt.toFixed(2);
    if (mult >= 10) {
      showMessage('🎰 JACKPOT! ' + results.join(''), 3000);
      document.getElementById('cabinet').classList.add('win-flash');
      setTimeout(() => document.getElementById('cabinet').classList.remove('win-flash'), 1600);
    } else if (mult >= 5) { showMessage('🔥 BIG WIN!', 2500);
    } else { showMessage('✨ YOU WIN!', 2000); }
  } else { showMessage('Try again...', 1500); }
  updateUI(); spinning = false;
  document.getElementById('spin-btn').disabled = false;
  if (balance < BETS[0]) setTimeout(() => showEndScreen('lose'), 600);
  else if (balance >= WIN_GOAL) setTimeout(() => showEndScreen('win'), 600);
}

function showEndScreen(type) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlay-title');
  const sub = document.getElementById('overlay-sub');
  if (type === 'win') {
    title.textContent = 'JACKPOT!'; title.className = 'overlay-title win-title';
    sub.textContent = 'You reached $100 and beat the house!';
  } else {
    title.textContent = 'GAME OVER'; title.className = 'overlay-title lose-title';
    sub.textContent = "You've gone broke. Better luck next time!";
  }
  overlay.classList.add('show');
}

function restart() {
  balance = START_BALANCE; currentBet = 0; spinning = false;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('spin-btn').disabled = false;
  document.getElementById('win-display').textContent = '—';
  document.querySelectorAll('.bet-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  document.getElementById('bet-display').textContent = '$0.20';
  hideMessage(); updateUI();
  for (let i = 0; i < 3; i++) {
    setReelSymbols('reel' + i, '🍒', '🍒', '🍒');
    document.getElementById('reel' + i).classList.remove('spinning');
  }
}

updateUI();
</script>
</body>
</html>
